			<div id="rectangle" class="gallery1">
				<figure class="gallery__thumb">
					<div class="title">Sadr and VDB 131/132</div>
					<div class="caption">Consisting of nearly 28 hours of exposure, this true color two panel mosaic of the Sadr field is my best rendition of it yet. This region is incredibly diverse, making it an appealing summer target. Bright pink hydrogen emission and dark dust lanes are prominent across the entire field, and the colorful star field that can be seen in this image is a reminder of its proximity to the Milky Way core. Small reflection nebulae are scattered across the area as well, with the most notable ones being VDB 131/132 (these are the bright blue "pearls" nested within the dark dust on the left of the image). A landmark of the region, the yellow-white supergiant star Sadr glows bright on the right.</div>
					<img src="images\preview\LowResSadr.png" alt="Sadr and VDB 131/132" class="gallery__image"></img>
				</figure>
			</div>

			<div id="rectangle3" class="gallery1">
				<figure class="gallery__thumb">
					<div class="title">Messier 16: The Eagle Nebula</div>
					<div class="caption">With a mere 2 hours of integration, this false color image of the Eagle Nebula was a short early night project. I captured this image with narrowband filters, which isolated the wavelengths of light associated with Hydrogen Alpha, Oxygen III and Sulfur II gas that make up this target. I used this data to create a false color image, in which red represents Sulfur II light, green represents Hydrogen Alpha light, and blue represents Oxygen III light. This type of imaging is particularly well suited to my light polluted conditions, with most of the city light being cut off by the filter.<br>The Pillars of Creation, which can be seen as dark structures against the blue background of the nebula's core, were made famous by Hubble's famous rendition. The pillars have been thoroughly researched due to the pockets of star forming dust that lie within them.</div>
					<img src="images\preview\Eagle.png" alt="The Eagle Nebula" class="gallery__image"></img>
				</figure>
			</div>

			<div id="rectangle4" class="gallery1">
				<figure class="gallery__thumb">
					<div class="title">M31: The Andromeda Galaxy</div>
					<div class="caption">The Andromeda Galaxy is a huge object in our skies. Stretching over 3 degrees, the spiral galaxy would appear larger than three full moons if our eyes were sensitive enough to see it. I used a telephoto camera lens (with a focal length of 135mm) to capture it in this rendition. The color contrast between the core and limbs of the galaxy indicates an interesting phenomenon: at the galaxy's center, old yellow stars burn relatively cold. Due to their smaller masses and lower temperatures, these stars can last for billions of years, leading to little star forming activity at the core. As stars are observed further from the core, their average temperature and size increases, creating a bluer hue. These giant blue stars have much shorter life spans than their yellow counterparts, often on the order of a few million years. Stars in this regions are constantly forming and dying, making the limbs more active than the galaxy's core.<br>The red spots dotting the galaxy's limbs were captured using a narrowband Hydrogen Alpha filter and added on to the true color image seen here. Much like the nebulae in our own galaxy, these hydrogen regions represent areas of active star formation.</div>
					<img src="images\preview\M31.png" alt="The Andromeda Galaxy" class="gallery__image"></img>
				</figure>
			</div>

			<div id="rectangle5" class="gallery1">
				<figure class="gallery__thumb">
					<div class="title">The Orion Constellation</div>
					<div class="caption">One of the most colorful regions of the sky, the Orion Constellation has been prominent in human culture for thousands of years. I captured it in this two panel mosaic using a 135mm telephoto lens and a dedicated astronomy camera. I made sure to highlight the region's diversity; the golden dust interlaced throughout the image gets its color from the golden stars of the Milky Way. Red Hydrogen Alpha emission is also spread throughout, most prominently seen above the Horsehead and Flame nebulae that lie on the bottommost of the three stars that make up Orion's Belt. Also seen in this image is what is often considred the jewel of the northern winter skies: the Orion Nebula, which shines bright on the right of the image. </div>
					<img src="images\preview\Orion.png" alt="The Orion Molecular Complex" class="gallery__image"></img>
				</figure>
			</div>

			<div id="rectangle6" class="gallery1">
				<figure class="gallery__thumb">
					<div class="title">The Elephant's Trunk Nebula</div>
					<div class="caption">Not much is there to be said about the Elephant's Trunk nebula, captured in this image with 10 hours of narrowband data. A color camera was used with a dual band filter to create a false color rendition. Since the filter only lets in two unique bands of light emitted by the nebula, Hydrogen Alpha and Oxygen III, a synthetic third channel was created with these bands to create a tricolor image. This led to a result in which blues represent pure Oxygen III, greens represent areas with Hydrogen Alpha and Oxygen III, and reds represent areas of pure Hydrogen Alpha.</div>
					<img src="images\preview\Elephant.png" alt="The Elephant's Trunk Nebula" class="gallery__image"></img>
				</figure>
			</div>

			<div id="rectangle7" class="gallery1">
				<figure class="gallery__thumb">
					<div class="title">M101 and Supernova SN2023ixf</div>
					<div class="caption">May of 2023 was made a little more exciting when the light from a supernova explosion reached Earth for us to observe. The supernova originated in the galaxy Messier 101, a bright spiral galaxy colloquially referred to as the Pinwheel Galaxy. With the spring skies perfectly timed to image this target, I collected 8 hours of true color data from my home. The color difference between the galaxy's core and its outer arms, explained more in depth in the Andromeda Galaxy image above, can also be observed in this face-on neighbour. Regions of red Hydrogen gas, added with data collected from a narrowband filter, dot the galaxy's arms. The aformentioned supernova, officially dubbed SN2023ixf, can be observed as a bright blue "star" north of the galaxy's core, on its topmost arm. The supernova continued to brighten for a few days after this image was taken before it began to dim.</div>
					<img src="images\preview\M101.png" alt="M101 and Supernova SN2023ixf" class="gallery__image"></img>
				</figure>
			</div>
